<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Admin Login</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    .card { max-width: 360px; border: 1px solid #ddd; padding: 16px; border-radius: 8px; }
    input { width: 100%; padding: 8px; margin: 8px 0; }
    button { padding: 8px 12px; width: 100%; }
    .err { color: #b00020; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Admin Login</h2>
    {% if err %}
      <div class="err">Invalid username or password</div>
    {% endif %}
    <form method="post" action="/admin/login">
      <label>Username</label>
      <input name="username" value="" required>
      <label>Password</label>
      <input name="password" type="password" required>
      <button type="submit">Login</button>
    </form>
    <p style="margin-top:12px" class="muted">
      Configure ADMIN_USERNAME and ADMIN_PASSWORD_HASH in .env
    </p>
  </div>
</body>
</html>
